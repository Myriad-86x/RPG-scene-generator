<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>RPG Seikkailu-generaattori</title>
    
    <!-- Ladataan ulkoiset tietokannat -->
    <script src="sijainnit.js"></script>
    <script src="viholliset.js"></script>
    <script src="ansat.js"></script>
    <script src="esineet.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .controls { padding: 20px; display: flex; gap: 10px; justify-content: center; background: #252525; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }
        
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .btn-loc { background: #3498db; color: white; }
        .btn-enemy { background: #e74c3c; color: white; }
        .btn-trap { background: #e67e22; color: white; }
        .btn-loot { background: #f1c40f; color: #333; }
        button:hover { transform: scale(1.05); opacity: 0.9; }

        #card-container { display: flex; align-items: flex-start; gap: 20px; padding: 40px; overflow-x: auto; flex-grow: 1; scroll-behavior: smooth; }

        .card { 
            background: #2c3e50; border: 2px solid #ecf0f1; border-radius: 15px; 
            min-width: 300px; max-width: 300px; padding: 20px; text-align: center; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); animation: slideIn 0.4s ease-out; flex-shrink: 0;
            transition: all 0.5s ease;
        }

        .card.completed { opacity: 0.4; filter: grayscale(100%) blur(0.5px); border-color: #7f8c8d; transform: translateY(10px); }
        .card.loot { border-color: #f1c40f; }
        .card.location { border-color: #3498db; }
        .card.trap { border-color: #e67e22; }

        .badge { position: absolute; top: 10px; right: 10px; border-radius: 20px; font-size: 0.75em; font-weight: bold; padding: 4px 12px; color: white; z-index: 5; }
        .xp-badge { background: #c0392b; }
        .dc-badge { background: #d35400; }

        .stats-box { background: rgba(0,0,0,0.3); border-radius: 8px; margin: 10px 0; padding: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .stat-line { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.85em; margin: 2px 0; }
        
        .ability-table { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; text-align: center; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px; }
        .ability-item { background: rgba(255,255,255,0.05); padding: 4px; border-radius: 4px; }
        .ability-label { font-size: 0.6em; text-transform: uppercase; color: #bdc3c7; display: block; }
        .ability-val { font-size: 0.85em; font-weight: bold; color: #f1c40f; }

        .card-image { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden; border-radius: 8px; background: #1e2b38; font-size: 50px; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        
        h3 { margin: 5px 0; color: #ecf0f1; font-size: 1.3em; }
        .description { font-size: 0.85em; color: #bdc3c7; line-height: 1.3; margin: 8px 0; font-style: italic; }
        .section-title { font-size: 0.9em; font-weight: bold; color: #f39c12; text-transform: uppercase; margin-bottom: 4px; display: block; text-align: left; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 10px; margin-top: 10px; }
        .section-text { font-size: 0.8em; color: #ecf0f1; line-height: 1.4; text-align: left; }

        .done-btn { margin-top: 15px; background: #27ae60; color: white; width: 100%; padding: 8px; font-size: 0.8em; border-radius: 5px; font-weight: bold; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-loc" onclick="generate('location')">📍 Sijainti</button>
        <button class="btn-enemy" onclick="generate('enemy')">⚔️ Vihollinen</button>
        <button class="btn-trap" onclick="generate('trap')">⚠️ Ansa</button>
        <button class="btn-loot" onclick="generate('loot')">💎 Loot</button>
    </div>

    <div id="card-container"></div>

    <script>
        // Kootaan tiedot listoista, jotka ladattiin HTML:n alussa
        const data = {
            location: (typeof sijainnit !== 'undefined') ? sijainnit : [],
            enemy: (typeof viholliset !== 'undefined') ? viholliset : [],
            trap: (typeof ansat !== 'undefined') ? ansat : [],
            loot: (typeof esineet !== 'undefined') ? esineet : []
        };

        function completeCard(btn) {
            const card = btn.closest('.card');
            card.classList.add('completed');
            btn.remove();
        }

        function generate(type) {
            const container = document.getElementById('card-container');
            const list = data[type];
            if (!list || list.length === 0) return alert("Virhe: Tietokantaa '" + type + ".js' ei löytynyt tai se on tyhjä.");

            const item = list[Math.floor(Math.random() * list.length)];
            const card = document.createElement('div');
            card.className = `card ${type}`;

            let badgeHtml = '';
            let statsHtml = '';
            let footerHtml = '';
            let doneBtnHtml = (type === 'enemy' || type === 'trap') ? `<button class="done-btn" onclick="completeCard(this)">✅ Merkitse suoritetuksi</button>` : '';

            if (type === 'enemy') {
                badgeHtml = `<div class="badge xp-badge">${item.xp} XP</div>`;
                statsHtml = `<div class="stats-box">
                    <div class="stat-line" style="color:#2ecc71"><span>HP:</span> <span>❤️ ${item.hp}</span></div>
                    <div class="stat-line" style="color:#3498db"><span>AC:</span> <span>🛡️ ${item.ac}</span></div>
                    <div class="stat-line" style="color:#9b59b6"><span>Hyökkäys:</span> <span>⚔️ ${item.atk}</span></div>
                    <div class="ability-table">
                        <div class="ability-item"><span class="ability-label">VOI</span><span class="ability-val">${item.stats.voi}</span></div>
                        <div class="ability-item"><span class="ability-label">KET</span><span class="ability-val">${item.stats.ket}</span></div>
                        <div class="ability-item"><span class="ability-label">SIT</span><span class="ability-val">${item.stats.sit}</span></div>
                        <div class="ability-item"><span class="ability-label">ÄLY</span><span class="ability-val">${item.stats.äly}</span></div>
                        <div class="ability-item"><span class="ability-label">VII</span><span class="ability-val">${item.stats.vii}</span></div>
                        <div class="ability-item"><span class="ability-label">KAR</span><span class="ability-val">${item.stats.kar}</span></div>
                    </div>
                </div>`;
                footerHtml = `<span class="section-title">Toiminnot</span><div class="section-text">${item.actions}</div>`;
            } else if (type === 'trap') {
                badgeHtml = `<div class="badge dc-badge">DC ${item.dc}</div>`;
                statsHtml = `<div class="stats-box"><div class="stat-line" style="color:#e67e22"><span>Vaikutus:</span> <span>🎲 ${item.effect}</span></div></div>`;
                footerHtml = `<span class="section-title">Mekaniikka</span><div class="section-text">${item.actions}</div>`;
            }

            const imagePath = `kuvat/${item.name}.png`;

            card.innerHTML = `
                ${badgeHtml}
                <div class="card-image"><img src="${imagePath}" alt="${item.name}" onerror="this.parentElement.innerHTML='${item.img}'"></div>
                <h3>${item.name}</h3>
                ${statsHtml}
                <p class="description">${item.desc}</p>
                ${footerHtml}
                ${doneBtnHtml}
            `;
            
            container.appendChild(card);
            setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 50);
        }
    </script>
</body>
</html>
