<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>RPG Multi-Database Generator</title>
    <style>
        /* (Pidetään aiemmat tyylit, lisätään valikon tyylit) */
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .controls { padding: 15px; display: flex; gap: 20px; justify-content: center; background: #252525; flex-wrap: wrap; border-bottom: 2px solid #333; }
        
        .control-group { display: flex; flex-direction: column; gap: 5px; align-items: center; background: #333; padding: 10px; border-radius: 8px; }
        select { background: #444; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; font-size: 0.8em; width: 140px; }
        
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; width: 100%; }
        .btn-loc { background: #3498db; color: white; }
        .btn-enemy { background: #e74c3c; color: white; }
        .btn-trap { background: #e67e22; color: white; }
        .btn-loot { background: #f1c40f; color: #333; }

        #card-container { display: flex; align-items: flex-start; gap: 20px; padding: 40px; overflow-x: auto; flex-grow: 1; scroll-behavior: smooth; }
        /* (Loput aiemmat korttityylit .card, .stats-box jne. tänne) */
        .card { background: #2c3e50; border: 2px solid #ecf0f1; border-radius: 15px; min-width: 300px; padding: 20px; text-align: center; position: relative; flex-shrink: 0; animation: slideIn 0.4s; }
        .card.completed { opacity: 0.4; filter: grayscale(100%); }
        .badge { position: absolute; top: 10px; right: 10px; border-radius: 20px; font-size: 0.75em; padding: 4px 12px; }
        .xp-badge { background: #c0392b; }
        .dc-badge { background: #d35400; }
        .card-image { width: 100%; height: 140px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: #1e2b38; font-size: 50px; margin-bottom: 10px; overflow: hidden; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .stats-box { background: rgba(0,0,0,0.3); border-radius: 8px; margin: 10px 0; padding: 10px; text-align: left; font-size: 0.85em; }
        .ability-table { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 10px; border-top: 1px solid #555; padding-top: 5px; }
        .done-btn { margin-top: 10px; background: #27ae60; color: white; border-radius: 5px; padding: 8px; width: 100%; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } }
    </style>
</head>
<body>

    <div class="controls">
        <!-- Sijainnit -->
        <div class="control-group">
            <select id="select-location">
                <option value="data/sijainnit_perus.js">Perusluolat</option>
                <option value="data/sijainnit_kaupunki.js">Kaupunki</option>
            </select>
            <button class="btn-loc" onclick="loadAndGenerate('location')">📍 Sijainti</button>
        </div>

        <!-- Viholliset -->
        <div class="control-group">
            <select id="select-enemy">
                <option value="data/viholliset_taso1.js">Taso 1-3</option>
                <option value="data/viholliset_bossit.js">Pomovastukset</option>
            </select>
            <button class="btn-enemy" onclick="loadAndGenerate('enemy')">⚔️ Vihollinen</button>
        </div>

        <!-- Ansat -->
        <div class="control-group">
            <select id="select-trap">
                <option value="data/ansat_helppo.js">Helpot ansat</option>
                <option value="data/ansat_tappavat.js">Tappavat</option>
            </select>
            <button class="btn-trap" onclick="loadAndGenerate('trap')">⚠️ Ansa</button>
        </div>

        <!-- Loot -->
        <div class="control-group">
            <select id="select-loot">
                <option value="data/esineet_yleiset.js">Yleiset tavarat</option>
                <option value="data/esineet_harvinaiset.js">Aarteet</option>
            </select>
            <button class="btn-loot" onclick="loadAndGenerate('loot')">💎 Loot</button>
        </div>
    </div>

    <div id="card-container"></div>

    <script>
        // Dynaaminen latausfunktio
        async function loadAndGenerate(type) {
            const selectId = `select-${type}`;
            const fileUrl = document.getElementById(selectId).value;

            try {
                const response = await fetch(fileUrl);
                if (!response.ok) throw new Error("Tiedostoa ei löytynyt");
                
                // Käsitellään JS-tiedosto tekstinä ja muutetaan se JSON-objektiksi
                const text = await response.text();
                // Poistetaan mahdolliset 'const nimi =' alusta, jos niitä jäi
                const jsonString = text.substring(text.indexOf('['));
                const list = JSON.parse(jsonString);

                createCard(type, list);
            } catch (err) {
                alert("Virhe ladattaessa tietokantaa: " + fileUrl + "\n(Varmista, että tiedosto on olemassa)");
                console.error(err);
            }
        }

        function createCard(type, list) {
            const container = document.getElementById('card-container');
            const item = list[Math.floor(Math.random() * list.length)];
            const card = document.createElement('div');
            card.className = `card ${type}`;

            let badge = '';
            let stats = '';
            let footer = '';

            if (type === 'enemy') {
                badge = `<div class="badge xp-badge">${item.xp} XP</div>`;
                stats = `<div class="stats-box">
                    <div>❤️ HP: ${item.hp} | 🛡️ AC: ${item.ac} | ⚔️ Atk: ${item.atk}</div>
                    <div class="ability-table">
                        ${Object.entries(item.stats).map(([k,v]) => `<div><small>${k.toUpperCase()}</small><br>${v}</div>`).join('')}
                    </div>
                </div>`;
                footer = `<div style="text-align:left; font-size:0.8em; border-top:1px dashed #555; padding-top:5px;"><b>Toiminnot:</b><br>${item.actions}</div>`;
            } else if (type === 'trap') {
                badge = `<div class="badge dc-badge">DC ${item.dc}</div>`;
                stats = `<div class="stats-box">🎲 Vaikutus: ${item.effect}</div>`;
                footer = `<div style="text-align:left; font-size:0.8em; border-top:1px dashed #555; padding-top:5px;"><b>Mekaniikka:</b><br>${item.actions}</div>`;
            }

            card.innerHTML = `
                ${badge}
                <div class="card-image"><img src="kuvat/${item.name}.png" onerror="this.parentElement.innerHTML='${item.img}'"></div>
                <h3>${item.name}</h3>
                ${stats}
                <p style="font-size:0.85em; font-style:italic; color:#bdc3c7;">${item.desc}</p>
                ${footer}
                ${(type==='enemy'||type==='trap') ? `<button class="done-btn" onclick="this.closest('.card').classList.add('completed'); this.remove();">✅ Valmis</button>` : ''}
            `;
            
            container.appendChild(card);
            container.scrollLeft = container.scrollWidth;
        }
    </script>
</body>
</html>
